name: Robocorp CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  run-robot:

    runs-on: windows-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install RCC
      shell: powershell
      run: |
        choco install robocorp-rcc -y

    - name: Verify RCC
      run: |
        rcc --version

    - name: Run Automation
      run: |
        rcc task run

    - name: Upload Output
      uses: actions/upload-artifact@v4
      with:
        name: robot-output
        path: output/